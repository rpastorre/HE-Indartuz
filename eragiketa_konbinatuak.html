<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <title>Jerarkia Masterra</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 800px; position: relative; }
        .header-info { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #7f8c8d; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        h1 { text-align: center; color: #2c3e50; margin-top: 0; }
        .target-box { background: #ebf5fb; border: 2px dashed var(--primary); padding: 20px; text-align: center; border-radius: 8px; margin: 20px 0; }
        .math-display { font-size: 3.5em; display: block; color: #2c3e50; font-weight: bold; }
        .input-group { display: flex; gap: 10px; margin: 20px 0; }
        input { flex-grow: 1; padding: 15px; font-size: 1.3em; border: 2px solid #bdc3c7; border-radius: 8px; font-family: monospace; }
        input:disabled { background-color: #f8f9fa; color: #27ae60; border-color: #27ae60; font-weight: bold; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-check { background-color: var(--primary); color: white; }
        .btn-next { background-color: var(--success); color: white; width: 100%; display: none; margin-top: 10px; font-size: 1.1em; }
        .btn-lang { background-color: #34495e; color: white; position: absolute; top: 10px; right: 10px; font-size: 0.8em; }
        .status-box { padding: 15px; border-radius: 8px; margin: 15px 0; font-weight: bold; text-align: center; display: none; }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .partial { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .wrong { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #summary { display: none; text-align: center; }
        .stat-val { font-size: 1.5em; color: var(--primary); font-weight: bold; margin-bottom: 10px; }
        .hint-text { color: var(--warning); font-weight: bold; margin-top: 10px; display: none; padding: 10px; border: 1px solid var(--warning); border-radius: 5px; }
        .sol-text { color: var(--success); font-weight: bold; margin-top: 5px; font-size: 1.2em; display: none; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-lang" onclick="toggleLang()">EU / ES</button>
    <h1 id="main-title">Jerarkia Masterra</h1>

    <div id="game-info" class="header-info" style="display:none">
        <div><span id="label-lvl">Maila</span>: <span id="val-lvl">-</span></div>
        <div><span id="label-prog">Eragiketa</span>: <span id="val-prog">0/0</span></div>
        <div><span id="label-time">Denbora</span>: <span id="val-time">00:00</span></div>
    </div>

    <div id="setup" style="text-align:center">
        <p id="setup-text">Hautatu hizkuntza eta sakatu hasierako botoia:</p>
        <button onclick="startGame()" style="background:var(--success); color:white; font-size: 1.2em;">HASI / EMPEZAR</button>
    </div>

    <div id="game" style="display:none">
        <div class="target-box">
            <span id="instr">Lortu beharreko emaitza:</span>
            <div id="target-math" class="math-display"></div>
        </div>
        <div style="text-align: center; color: #95a5a6;"><span id="hint-label">Jatorrizkoa:</span> <span id="hint-math"></span></div>
        
        <div class="input-group">
            <input type="text" id="userInput" spellcheck="false" autocomplete="off">
            <button class="btn-check" onclick="verify()" id="btn-verify">Egiaztatu</button>
        </div>

        <div id="status-area" class="status-box"></div>
        <div id="user-res-display" style="text-align: center; font-size: 1.1em; margin-bottom: 5px;"></div>
        <div id="hint-display" class="hint-text"></div>
        <div id="solution-display" class="sol-text"></div>
        
        <button id="btn-next-op" class="btn-next" onclick="goToNext()">HURRENGOA / SIGUIENTE</button>
        <button id="btn-finish-manual" onclick="endGame()" style="display:none; background:var(--danger); color:white; width:100%; margin-top:10px;">AMITU / TERMINAR</button>
    </div>

    <div id="summary">
        <h2 id="sum-title">Emaitzak</h2>
        <p id="sum-lvl-label">Iritsitako maila:</p>
        <div id="sum-lvl" class="stat-val"></div>
        <p id="sum-ops-label">Ebatzi dituzun eragiketak:</p>
        <div id="sum-ops" class="stat-val"></div>
        <p id="sum-time-label">Erabilitako denbora:</p>
        <div id="sum-time" class="stat-val"></div>
        <button onclick="location.reload()" style="margin-top:20px; background:var(--primary); color:white" id="btn-restart">Berriro hasi</button>
    </div>
</div>

function toggleLang() { currentLang = currentLang === 'eu' ? 'es' : 'eu'; updateUI(); }

function updateUI() {
    const t = texts[currentLang];
    document.getElementById('main-title').innerText = t.title;
    document.getElementById('setup-text').innerText = t.setup;
    document.getElementById('instr').innerText = t.instr;
    document.getElementById('hint-label').innerText = t.hint;
    document.getElementById('btn-verify').innerText = t.verify;
    document.getElementById('btn-next-op').innerText = t.next;
    document.getElementById('btn-finish-manual').innerText = t.finish;
    document.getElementById('label-lvl').innerText = t.label_lvl;
    document.getElementById('label-prog').innerText = t.label_prog;
    document.getElementById('label-time').innerText = t.label_time;
    document.getElementById('btn-restart').innerText = t.restart;
    document.getElementById('sum-title').innerText = t.sum_title;
    document.getElementById('sum-lvl-label').innerText = t.sum_lvl;
    document.getElementById('sum-ops-label').innerText = t.sum_ops;
    document.getElementById('sum-time-label').innerText = t.sum_time;
}

function startGame() {
    gameQuestions = [];
    const shuffle = (array) => array.sort(() => Math.random() - 0.5);
    gameQuestions.push(...shuffle(RAW_DB.filter(o => o.lvl === 1)).slice(0, CONFIG.lvl1_count));
    gameQuestions.push(...shuffle(RAW_DB.filter(o => o.lvl === 2)).slice(0, CONFIG.lvl2_count));
    gameQuestions.push(...shuffle(RAW_DB.filter(o => o.lvl === 3)).slice(0, CONFIG.lvl3_count));

    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('game-info').style.display = 'flex';
    currentIdx = 0;
    failCount = 0;
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
    showQuestion();
}

function updateTimer() {
    let diff = Math.floor((Date.now() - startTime) / 1000);
    let m = Math.floor(diff / 60).toString().padStart(2, '0');
    let s = (diff % 60).toString().padStart(2, '0');
    document.getElementById('val-time').innerText = `${m}:${s}`;
}

function showQuestion() {
    let q = gameQuestions[currentIdx];
    failCount = 0;
    document.getElementById('val-lvl').innerText = q.lvl;
    document.getElementById('val-prog').innerText = `${currentIdx + 1}/${gameQuestions.length}`;
    document.getElementById('status-area').style.display = 'none';
    document.getElementById('user-res-display').innerHTML = "";
    document.getElementById('hint-display').style.display = 'none';
    document.getElementById('solution-display').style.display = 'none';
    document.getElementById('userInput').value = q.naked;
    document.getElementById('userInput').disabled = false;
    document.getElementById('btn-verify').disabled = false;
    document.getElementById('btn-next-op').style.display = 'none';
    
    katex.render(q.target.toString(), document.getElementById('target-math'));
    katex.render(q.naked.replace(/\//g, ':').replace(/\*/g, '\\cdot'), document.getElementById('hint-math'));
    document.getElementById('btn-finish-manual').style.display = (q.lvl === 3) ? 'block' : 'none';
}

function isRedundant(expr) {
    let clean = expr.replace(/:/g, '/').replace(/·/g, '*').replace(/\[/g, '(').replace(/\]/g, ')');
    let originalValue = eval(clean);
    for (let i = 0; i < expr.length; i++) {
        if (expr[i] === '(') {
            let count = 1;
            for (let j = i + 1; j < expr.length; j++) {
                if (expr[j] === '(') count++; if (expr[j] === ')') count--;
                if (count === 0) {
                    let testExpr = expr.substring(0, i) + expr.substring(i + 1, j) + expr.substring(j + 1);
                    try { if (eval(testExpr.replace(/:/g, '/').replace(/\*/g, '*')) === originalValue) return true; } catch(e) {}
                    break;
                }
            }
        }
    }
    return false;
}

function verify() {
    const t = texts[currentLang];
    const q = gameQuestions[currentIdx];
    let input = document.getElementById('userInput').value.replace(/\s+/g, '');
    let statusBox = document.getElementById('status-area');
    
    if (input.replace(/[()\[\]{}]/g, '') !== q.naked) { alert(t.cheat); return; }

    try {
        let mathIn = input.replace(/:/g, '/').replace(/·/g, '*').replace(/\[/g, '(').replace(/\]/g, ')');
        let res = eval(mathIn);
        document.getElementById('user-res-display').innerHTML = `${t.user_res} <strong>${res}</strong>`;
        statusBox.style.display = 'block';

        if (Math.abs(res - q.target) < 0.01) {
            if (isRedundant(input)) {
                statusBox.className = "status-box partial";
                statusBox.innerText = t.partial;
            } else {
                statusBox.className = "status-box correct";
                statusBox.innerText = t.correct;
                document.getElementById('userInput').disabled = true;
                document.getElementById('btn-verify').disabled = true;
                let solDisp = document.getElementById('solution-display');
                solDisp.style.display = 'block';
                katex.render(t.sol_found + input.replace(/\*/g, '\\cdot').replace(/\//g, ':'), solDisp);
                document.getElementById('btn-next-op').style.display = 'block';
                document.getElementById('hint-display').style.display = 'none';
            }
        } else {
            statusBox.className = "status-box wrong";
            statusBox.innerText = t.wrong;
            failCount++;
            if (failCount >= 3) {
                let hDisp = document.getElementById('hint-display');
                hDisp.innerText = t.hint_msg + q.hint;
                hDisp.style.display = 'block';
            }
        }
    } catch(e) { alert(t.syntax); }
}

function goToNext() {
    currentIdx++;
    if (currentIdx < gameQuestions.length) showQuestion();
    else endGame();
}

function endGame() {
    clearInterval(timerInterval);
    document.getElementById('game').style.display = 'none';
    document.getElementById('game-info').style.display = 'none';
    document.getElementById('summary').style.display = 'block';
    document.getElementById('sum-lvl').innerText = gameQuestions[currentIdx] ? gameQuestions[currentIdx].lvl : 3;
    document.getElementById('sum-ops').innerText = currentIdx;
    document.getElementById('sum-time').innerText = document.getElementById('val-time').innerText;
}

updateUI();
</script>
